# Repo-level tooling config. Per-project runtime deps live in each project's
# requirements.txt; pin them reproducibly with:
#   pip install -r <project>/requirements.txt -c constraints.txt
[project]
name = "semiconductor-pe-portfolio"
version = "0.1.0"
description = "Product Engineering portfolio — synthetic and public-data semiconductor quality and failure-analysis projects"
requires-python = ">=3.9"

[tool.ruff]
line-length = 120
target-version = "py39"
extend-exclude = ["**/data", "**/_prep", ".venv", "**/.cache", "**/.ipynb_checkpoints"]

[tool.ruff.lint]
# Conservative, high-signal rule set (pyflakes errors, import order, whitespace).
select = ["E9", "F", "I", "W"]
ignore = ["E501"]   # long auto-generated report/markdown f-strings are tolerated

[tool.pytest.ini_options]
addopts = "-q"
testpaths = [
  "fail_bit_map_pe/tests",
  "secom_quality_8d/tests",
  "manufacturing_quality_platform/tests",
  "tests",
]
